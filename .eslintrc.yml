---
env:
  node: true
  browser: true
  es2020: true
parser: '@typescript-eslint/parser'
parserOptions:
  project: ./tsconfig.dev.json
plugins:
  - '@typescript-eslint'
extends:
  - eslint:recommended
  - plugin:@typescript-eslint/eslint-recommended
  - plugin:@typescript-eslint/recommended
  - prettier
ignorePatterns:
  - commitlint.config.cjs
  - playwright.config.js
  - release.config.cjs
  - vite.config.js
  - vite.doc.config.js
